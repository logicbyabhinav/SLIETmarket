<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Comment added -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SLIET Market — Welcome!</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100dvh; padding:24px; }
    .welcome-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl);
      padding:clamp(32px,5vw,56px); max-width:440px; width:100%;
      text-align:center; position:relative; overflow:hidden;
      animation:fade-up .5s ease forwards;
    }
    @keyframes fade-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .welcome-card .glow { width:300px; height:300px; top:-80px; left:50%; transform:translateX(-50%); }
    .check-ring {
      width:80px; height:80px; border-radius:50%; background:var(--accent);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 24px; position:relative; z-index:1;
      box-shadow:0 0 40px rgba(79,142,247,.35);
      animation:pop .5s .2s ease both;
    }
    @keyframes pop { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
    .check-ring .material-symbols-outlined { font-size:38px; color:#fff; font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
    .ring-orbit {
      position:absolute; top:50%; left:50%; width:100px; height:100px;
      border:1px solid rgba(79,142,247,.2); border-radius:50%;
      transform:translate(-50%,-50%);
    }
    .welcome-title { position:relative; z-index:1; margin-bottom:12px; }
    .welcome-sub { color:var(--txt-2); font-size:clamp(13px,1.5vw,15px); max-width:280px; margin:0 auto 32px; line-height:1.6; position:relative; z-index:1; }
    .preview-row { display:flex; gap:8px; margin-bottom:32px; position:relative; z-index:1; }
    .preview-img { flex:1; height:60px; border-radius:var(--r); overflow:hidden; opacity:.5; }
    .preview-img img { width:100%; height:100%; object-fit:cover; }
    .welcome-logo { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:24px; padding-top:20px; border-top:1px solid var(--border); }
    .welcome-logo .material-symbols-outlined { color:var(--accent); }
    .welcome-logo span { font-family:'Syne',sans-serif; font-weight:800; font-size:16px; color:var(--accent); }
    .bg-dots { position:fixed; inset:0; z-index:-1; background-image:radial-gradient(var(--border) 1px,transparent 1px); background-size:28px 28px; opacity:.4; }
  </style>
</head>
<body>
<div class="bg-dots"></div>
<div class="welcome-card">
  <div class="glow glow-blue"></div>
  <div class="check-ring">
    <span class="material-symbols-outlined">check</span>
    <div class="ring-orbit"></div>
  </div>
  <h1 class="txt-h1 welcome-title">Welcome to the Community!</h1>
  <p class="welcome-sub">Your account has been created successfully. Explore the campus marketplace and start trading!</p>
  <div class="preview-row">
    <div class="preview-img"><img src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=120&q=60" alt="Books"/></div>
    <div class="preview-img"><img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=120&q=60" alt="Laptop"/></div>
    <div class="preview-img"><img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=120&q=60" alt="Cycle"/></div>
  </div>
  <a href="marketplace.html" class="btn btn-primary btn-full btn-lg" style="text-decoration:none;">
    <span class="material-symbols-outlined">storefront</span>
    Enter Marketplace
  </a>
  <div class="welcome-logo">
    <span class="material-symbols-outlined">hub</span>
    <span>SLIET Market</span>
  </div>
</div>
</body>
</html>
