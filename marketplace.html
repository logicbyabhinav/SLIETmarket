<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLIET Market — Marketplace</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .page-header {
        margin-bottom: clamp(16px, 2.5vw, 28px);
      }
      .header-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .item-count {
        font-size: 12px;
        color: var(--txt-3);
        margin-bottom: 16px;
      }
      /* Detail modal two-col */
      .detail-modal {
        max-width: 680px;
      }
      .detail-inner {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }
      .detail-img-col {
        background: var(--bg-input);
        min-height: 300px;
      }
      .detail-img-col img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .detail-info-col {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow-y: auto;
      }
      @media (max-width: 580px) {
        .detail-inner {
          grid-template-columns: 1fr;
        }
        .detail-img-col {
          aspect-ratio: 16/9;
        }
      }
      .detail-price {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: clamp(22px, 3vw, 30px);
        color: var(--accent);
      }
      .detail-seller {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 0;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }
      .detail-seller-av {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--accent-dim);
        color: var(--accent);
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      /* Offer inline form */
      .offer-form {
        display: none;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        background: var(--bg-input);
        border-radius: var(--r);
        border: 1px solid var(--border);
      }
      .offer-form.open {
        display: flex;
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <a href="marketplace.html" class="navbar-brand">
        <span class="material-symbols-outlined brand-icon">hub</span>
        <span class="brand-name">SLIET Market</span>
      </a>
      <div class="navbar-tabs">
        <a href="marketplace.html" class="nav-tab active">Market</a>
        <a href="listings.html" class="nav-tab">Your Listings</a>
        <a href="bids.html" class="nav-tab">Your Bids</a>
      </div>
      <div class="navbar-right">
        <span class="navbar-username" id="navUsername">...</span>
        <div class="avatar" id="navAvatar">?</div>
        <a href="#" class="btn-logout" onclick="logout()">Logout</a>
      </div>
      <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </div>
    </nav>

    <!-- Mobile menu -->
    <nav class="mobile-menu" id="mobileMenu">
      <a href="marketplace.html" class="active">Market</a>
      <a href="listings.html">Your Listings</a>
      <a href="bids.html">Your Bids</a>
      <div class="menu-divider"></div>
      <a href="#" onclick="logout()">Logout</a>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="page-content">
      <div class="page-header">
        <div class="header-row">
          <div>
            <h1 class="txt-h1" style="margin-bottom: 6px">
              Campus Marketplace
            </h1>
            <p class="txt-body">
              Find textbooks, cycles, and hostel essentials from fellow
              SLIETians.
            </p>
          </div>
          <div class="search-wrap">
            <span class="material-symbols-outlined search-icon-el">search</span>
            <input
              class="input"
              id="searchInput"
              type="text"
              placeholder="Search for electronics, books..."
              oninput="filterCards()"
            />
          </div>
        </div>
        <!-- Category chips -->
        <div class="chips-row" id="chipsRow">
          <button class="chip active" onclick="setChip(this, 'All')">
            All Items
          </button>
          <button class="chip" onclick="setChip(this, 'Books & Notes')">
            Books &amp; Notes
          </button>
          <button class="chip" onclick="setChip(this, 'Electronics & Gadgets')">
            Electronics
          </button>
          <button class="chip" onclick="setChip(this, 'Cycles & Transport')">
            Cycles
          </button>
          <button class="chip" onclick="setChip(this, 'Hostel & Furniture')">
            Hostel
          </button>
          <button class="chip" onclick="setChip(this, 'Clothing')">
            Clothing
          </button>
          <button class="chip" onclick="setChip(this, 'Sports & Fitness')">
            Sports
          </button>
          <button class="chip" onclick="setChip(this, 'Stationery')">
            Stationery
          </button>
        </div>
      </div>

      <p class="item-count" id="itemCount"></p>

      <!-- Cards Grid -->
      <div class="card-grid" id="cardGrid"></div>
    </main>

    <!-- Item Detail Modal -->
    <div class="modal-overlay" id="detailModal">
      <div class="modal detail-modal">
        <div class="detail-inner">
          <div class="detail-img-col" id="detailImgCol">
            <div class="img-gallery">
              <div class="img-track" id="imgTrack"></div>
              <button class="img-arrow img-arrow-left" onclick="goSlide(-1)">
                <span class="material-symbols-outlined" style="font-size: 18px"
                  >chevron_left</span
                >
              </button>
              <button class="img-arrow img-arrow-right" onclick="goSlide(1)">
                <span class="material-symbols-outlined" style="font-size: 18px"
                  >chevron_right</span
                >
              </button>
            </div>
          </div>
          <div class="detail-info-col">
            <button
              class="modal-close"
              style="align-self: flex-end"
              onclick="closeModal('detailModal')"
            >
              <span class="material-symbols-outlined">close</span>
            </button>
            <div>
              <span
                class="badge badge-active"
                id="detailCat"
                style="margin-bottom: 8px"
              ></span>
              <h2 class="txt-h2" id="detailTitle"></h2>
            </div>
            <div class="detail-price" id="detailPrice"></div>
            <div class="detail-seller">
              <div class="detail-seller-av" id="detailSellerAv"></div>
              <div>
                <div
                  style="font-size: 14px; font-weight: 600; color: var(--txt-1)"
                  id="detailSellerName"
                ></div>
                <div class="txt-muted" id="detailPosted"></div>
              </div>
            </div>
            <p class="txt-body" id="detailDesc"></p>
            <div id="detailActions"><!-- injected by JS --></div>
            <!-- Offer inline form -->
            <div class="offer-form" id="offerForm">
              <div class="input-group">
                <label class="input-label">Your Offer (₹)</label>
                <div class="price-input-wrap">
                  <span class="price-prefix">₹</span>
                  <input
                    class="input"
                    id="offerPrice"
                    type="number"
                    placeholder="0"
                  />
                </div>
              </div>
              <div class="input-group">
                <label class="input-label">Message (optional)</label>
                <textarea
                  class="input"
                  id="offerMsg"
                  rows="2"
                  placeholder="Why should they pick your offer?"
                ></textarea>
              </div>
              <div style="display: flex; gap: 8px">
                <button
                  class="btn btn-primary"
                  style="flex: 1"
                  onclick="submitOffer()"
                >
                  Submit Offer
                </button>
                <button
                  class="btn btn-ghost btn-sm"
                  onclick="
                    document
                      .getElementById('offerForm')
                      .classList.remove('open')
                  "
                >
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>
    <script src="js/app.js"></script>
    <!-- guard.js checks login, market.js loads real Firestore data -->
    <script type="module" src="js/guard.js"></script>
    <script type="module" src="js/market.js"></script>
  </body>
</html>
